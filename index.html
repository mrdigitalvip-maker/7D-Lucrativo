<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Academia Algoritmo Global</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0c0c0c;
color:white;
}

header{
background:linear-gradient(45deg,#ffcc00,#ff8800);
padding:20px;
font-weight:bold;
text-align:center;
color:black;
font-size:20px;
}

.login{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#000,#111,#000);
}

.login-box{
background:#111;
padding:40px;
border-radius:12px;
width:350px;
box-shadow:0 0 30px rgba(255,200,0,0.4);
text-align:center;
}

.login-box input{
width:100%;
padding:12px;
margin-top:20px;
border-radius:6px;
border:none;
}

.login-box button{
width:100%;
padding:12px;
margin-top:20px;
background:#ffcc00;
border:none;
border-radius:6px;
font-weight:bold;
}

#app{
display:none;
}

.dashboard{
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#151515;
padding:20px;
border-radius:10px;
}

.chapters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:30px;
}

.chapter{
background:#1a1a1a;
padding:20px;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.chapter.locked{
opacity:0.4;
cursor:not-allowed;
}

.chapter:hover{
transform:scale(1.03);
}

.progress{
height:10px;
background:#333;
border-radius:10px;
margin-top:10px;
}

.progress-bar{
height:10px;
background:#ffcc00;
border-radius:10px;
width:0%;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.ai-tools{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.ai{
background:#1b1b1b;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>
</head>

<body>

<div class="login" id="login">

<div class="login-box">

<h2>Área Premium</h2>

<p>Entre com sua senha de aluno</p>

<input type="password" id="senha" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p style="font-size:12px;margin-top:20px">
Aprenda algoritmo, viralização e crescimento digital.
</p>

</div>

</div>

<div id="app">

<header>Academia Algoritmo Global</header>

<div class="dashboard">

<h2>Dashboard do aluno</h2>

<div class="stats">

<div class="card">
<h3>Progresso do curso</h3>
<div class="progress">
<div class="progress-bar" id="progress"></div>
</div>
</div>

<div class="card">
<h3>Capítulos concluídos</h3>
<p id="done">0 / 25</p>
</div>

</div>

<h2 style="margin-top:40px">Capítulos</h2>

<div class="chapters" id="chapters"></div>

<h2 style="margin-top:50px">Gráficos de crescimento</h2>

<canvas id="chart1"></canvas>

<h2 style="margin-top:50px">Galeria de conteúdos virais</h2>

<div class="gallery">

<img src="https://picsum.photos/400/300?1">
<img src="https://picsum.photos/400/300?2">
<img src="https://picsum.photos/400/300?3">
<img src="https://picsum.photos/400/300?4">

</div>

<h2 style="margin-top:50px">Ferramentas de IA</h2>

<div class="ai-tools">

<div class="ai">
<i class="fa-solid fa-robot fa-2x"></i>
<p>ChatGPT</p>
</div>

<div class="ai">
<i class="fa-solid fa-image fa-2x"></i>
<p>Midjourney</p>
</div>

</div>

</div>

</div>

<script>

const total=25
let completed=0

function login(){

const s=document.getElementById("senha").value

if(s==="ALUNO2026"){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

init()

}else{

alert("senha incorreta")

}

}

function init(){

const container=document.getElementById("chapters")

for(let i=1;i<=total;i++){

let div=document.createElement("div")

div.className="chapter"

if(i>1)div.classList.add("locked")

div.innerHTML="<h3>Capítulo "+i+"</h3><p>Estratégias de crescimento digital</p>"

div.onclick=()=>complete(i)

container.appendChild(div)

}

createChart()

}

function complete(i){

const chapters=document.querySelectorAll(".chapter")

if(chapters[i-1].classList.contains("locked"))return

if(!chapters[i-1].classList.contains("done")){

chapters[i-1].classList.add("done")

completed++

document.getElementById("done").innerText=completed+" / "+total

let progress=(completed/total)*100

document.getElementById("progress").style.width=progress+"%"

}

if(chapters[i])chapters[i].classList.remove("locked")

}

function createChart(){

new Chart(document.getElementById("chart1"),{

type:"line",

data:{

labels:["Post 1","Post 2","Post 3","Post 4","Post 5"],

datasets:[{

label:"Alcance",

data:[100,500,2000,8000,25000]

}]

}

})

}

</script>

</body>
</html>
